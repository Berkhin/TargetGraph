# Serves the built Vite SPA and reverse-proxies the API (REST + WebSocket) to
# the FastAPI `backend` container. Copied into /etc/nginx/conf.d/default.conf,
# which Nginx includes inside the http{} context — so the `map` below is valid
# here and resolves the Connection header for WebSocket upgrades.

# Echo "upgrade" only when the client actually requested an upgrade; otherwise
# send "close". A hard-coded `Connection: upgrade` would break plain REST calls.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback: unknown paths resolve to index.html so client-side
    # routing works on hard refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Single block handles both REST and the /jobs/{id}/ws-match WebSocket,
    # since both live under /api/v1. No trailing URI on proxy_pass means the
    # full original path (/api/v1/...) is forwarded verbatim to the backend.
    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        # WebSocket upgrade handshake.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Preserve client info for the backend / structured logs.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stream pipeline frames as they arrive; don't sever idle WS sockets.
        proxy_buffering   off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
