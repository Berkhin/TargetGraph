# Local development Postgres for the TargetGraph data layer.
#
# Run from the repository root so Compose picks up the root .env for variable
# substitution:
#
#     docker compose -f infra/docker-compose.yml up -d
#
# Data persists in the named volume `targetgraph_pgdata` across container
# restarts/recreates (removed only with `docker compose ... down -v`).
services:
  db:
    image: postgres:16
    container_name: targetgraph-pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
    name: targetgraph_pgdata
