# Local development Postgres for the TargetGraph data layer.
#
# Run from the repository root so Compose picks up the root .env for variable
# substitution:
#
#     docker compose -f infra/docker-compose.yml up -d
#
# Data persists in the named volume `targetgraph_pgdata` across container
# restarts/recreates (removed only with `docker compose ... down -v`).
services:
  db:
    image: postgres:16
    container_name: targetgraph-pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # FastAPI app. Reachable to the frontend container as host `backend` on the
  # default compose network — this is the name Nginx proxies to.
  backend:
    build:
      context: ../backend
    container_name: targetgraph-backend
    init: true
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # No host port published: traffic reaches it only via the Nginx proxy.
    expose:
      - "8000"

  # Nginx serves the built SPA and reverse-proxies /api (REST + WS) to backend.
  frontend:
    build:
      context: ../frontend
    container_name: targetgraph-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped

volumes:
  pgdata:
    name: targetgraph_pgdata
